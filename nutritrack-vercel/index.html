<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="NutriTrack AI">
<title>NutriTrack AI</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#0f0e11;--card:#1a1820;--border:#2e2b38;--accent:#c8f565;--protein:#60a5fa;--carbs:#f59e0b;--fat:#f472b6;--text:#f0eef5;--muted:#8b87a0;--over:#f87171;}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,sans-serif;min-height:100vh;padding-bottom:40px;}
button{cursor:pointer;font-family:inherit;}
textarea,input{font-family:inherit;}
textarea:focus,input:focus{outline:none;}
textarea::placeholder{color:#6b6882;}
.hdr{position:sticky;top:0;z-index:10;background:var(--bg);border-bottom:1px solid var(--border);padding:16px 20px 0;}
.wrap{max-width:680px;margin:0 auto;}
.tabs{display:flex;gap:4px;background:var(--card);border-radius:12px;padding:4px;border:1px solid var(--border);}
.tab{flex:1;border:none;border-radius:9px;padding:9px 0;font-weight:700;font-size:13px;cursor:pointer;}
.tab.on{background:var(--accent);color:#0f0e11;}
.tab.off{background:transparent;color:var(--muted);}
.card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:18px;margin-bottom:14px;}
.grad{background:linear-gradient(135deg,#1e1c2a,#16141f);border:1px solid rgba(200,245,101,.25);border-radius:20px;padding:22px;margin-bottom:24px;}
.mbrow{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;}
.mb{border-radius:12px;padding:10px 14px;display:flex;flex-direction:column;align-items:center;min-width:76px;}
.mv{font-weight:700;font-size:18px;}
.ml{font-size:10px;margin-top:2px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);}
.gbw{margin-bottom:14px;}
.gbh{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px;font-size:13px;}
.gbt{height:7px;border-radius:4px;overflow:hidden;}
.gbf{height:100%;border-radius:4px;transition:width .5s;}
.inp{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:20px;margin-bottom:22px;}
.mtb{border-radius:8px;padding:7px 15px;font-size:12px;font-weight:700;border:1px solid var(--border);cursor:pointer;}
.mta{width:100%;background:transparent;border:none;color:var(--text);font-size:15px;resize:none;line-height:1.6;margin-bottom:14px;}
.arow{display:flex;gap:10px;align-items:center;}
.pbtn{background:rgba(200,245,101,.12);border:1px solid rgba(200,245,101,.35);border-radius:10px;padding:10px 18px;color:var(--accent);font-size:13px;font-weight:600;}
.abtn{flex:1;border:none;border-radius:10px;padding:11px 20px;font-weight:700;font-size:14px;cursor:pointer;}
.abtn.on{background:var(--accent);color:#0f0e11;}
.abtn.off{background:var(--border);color:var(--muted);cursor:default;}
.mhdr{display:flex;gap:14px;margin-bottom:12px;}
.mbdg{display:inline-block;background:var(--accent);color:#0f0e11;border-radius:6px;padding:2px 9px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:5px;}
.mdsc{color:var(--text);font-weight:600;font-size:14px;line-height:1.5;word-break:break-word;}
.delbtn{background:transparent;border:none;color:var(--muted);font-size:22px;line-height:1;padding:0 4px;margin-left:auto;cursor:pointer;}
.spin{width:18px;height:18px;border:2px solid var(--accent);border-top-color:transparent;border-radius:50%;animation:spin 1s linear infinite;}
.errbox{color:var(--over);font-size:12px;background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.25);border-radius:8px;padding:8px 12px;}
.bdr{display:flex;justify-content:space-between;align-items:center;padding:6px 0;font-size:12px;border-bottom:1px solid rgba(255,255,255,.04);}
.bdr:last-child{border-bottom:none;}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:100;display:none;align-items:center;justify-content:center;padding:20px;}
.mbox{background:#1a1820;border-radius:20px;padding:28px;width:100%;max-width:500px;}
.mimg{width:90px;height:90px;object-fit:cover;border-radius:12px;border:1px solid var(--border);}
.mtxt{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:10px 14px;color:var(--text);font-size:14px;resize:none;margin-bottom:16px;}
.hcard{background:var(--card);border-radius:18px;padding:18px;margin-bottom:14px;}
.pbar{height:5px;background:rgba(200,245,101,.2);border-radius:3px;overflow:hidden;margin-bottom:12px;}
.pfill{height:100%;background:var(--accent);border-radius:3px;}
.empty{text-align:center;color:var(--muted);font-size:14px;padding:50px 20px;line-height:2.2;}
.aibdg{display:flex;align-items:center;gap:7px;background:rgba(200,245,101,.12);border:1px solid rgba(200,245,101,.3);border-radius:10px;padding:5px 12px;}
.aidot{width:7px;height:7px;border-radius:50%;background:var(--accent);animation:pulse 2s infinite;}
.ldg{color:var(--muted);font-size:13px;display:flex;align-items:center;gap:10px;}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes si{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.si{animation:si .3s ease;}
@media(max-width:480px){.hdr{padding:12px 16px 0;}.wrap{padding:0 14px;}}
</style>
</head>
<body>

<!-- MODAL -->
<div id="modal" class="modal" style="display:none;">
  <div class="mbox">
    <div style="display:flex;gap:16px;margin-bottom:18px;align-items:center;">
      <img id="mprev" src="" class="mimg">
      <div>
        <div style="color:var(--accent);font-weight:700;font-size:17px;margin-bottom:4px;">Photo ready ✓</div>
        <div style="color:var(--muted);font-size:13px;">Add description for better accuracy (optional)</div>
      </div>
    </div>
    <textarea id="mdesc" class="mtxt" rows="2" placeholder="e.g. large portion, extra sauce…"></textarea>
    <div style="display:flex;gap:10px;">
      <button onclick="closeModal()" style="flex:1;background:transparent;border:1px solid var(--border);border-radius:10px;padding:11px;color:var(--muted);font-size:14px;font-weight:600;">Cancel</button>
      <button onclick="confirmPhoto()" style="flex:2;background:var(--accent);color:#0f0e11;border:none;border-radius:10px;padding:11px;font-size:14px;font-weight:700;">Analyze with Claude →</button>
    </div>
  </div>
</div>

<!-- HEADER -->
<div class="hdr">
  <div class="wrap" style="padding-bottom:0;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">
      <div>
        <div style="color:var(--accent);font-size:10px;letter-spacing:3px;text-transform:uppercase;margin-bottom:4px;">Daily Nutrition Log</div>
        <h1 style="font-weight:800;font-size:24px;">What did you <span style="color:var(--accent);">eat today?</span></h1>
      </div>
      <div class="aibdg"><div class="aidot"></div><span style="color:var(--accent);font-size:12px;font-weight:600;">Claude AI</span></div>
    </div>
    <div class="tabs">
      <button class="tab on" id="t0" onclick="showTab(0)">🍽 Today</button>
      <button class="tab off" id="t1" onclick="showTab(1)">📅 History</button>
    </div>
  </div>
</div>

<!-- CONTENT -->
<div class="wrap" style="padding:20px;">

  <!-- TODAY -->
  <div id="v0">
    <div class="card" style="margin-bottom:20px;">
      <div style="color:var(--muted);font-size:10px;letter-spacing:2px;text-transform:uppercase;margin-bottom:10px;">Your Daily Goals</div>
      <div style="display:flex;flex-wrap:wrap;text-align:center;">
        <div style="flex:1;min-width:70px;"><div>🔥</div><div style="color:var(--accent);font-weight:700;">2440<span style="font-size:10px;">kcal</span></div><div style="color:var(--muted);font-size:11px;">Cal</div></div>
        <div style="flex:1;min-width:70px;"><div>💪</div><div style="color:var(--protein);font-weight:700;">180<span style="font-size:10px;">g</span></div><div style="color:var(--muted);font-size:11px;">Protein</div></div>
        <div style="flex:1;min-width:70px;"><div>🌾</div><div style="color:var(--carbs);font-weight:700;">250<span style="font-size:10px;">g</span></div><div style="color:var(--muted);font-size:11px;">Carbs</div></div>
        <div style="flex:1;min-width:70px;"><div>🥑</div><div style="color:var(--fat);font-weight:700;">80<span style="font-size:10px;">g</span></div><div style="color:var(--muted);font-size:11px;">Fat</div></div>
      </div>
    </div>
    <div id="summary"></div>
    <div class="inp">
      <div id="mtbrow" style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;"></div>
      <textarea id="mi" class="mta" rows="3" placeholder="Describe your meal… e.g. '3 fried eggs with olive oil', 'شاورما دجاج مع خبز'" oninput="updBtn()"></textarea>
      <div class="arow">
        <button class="pbtn" onclick="document.getElementById('pi').click()">📷 Photo</button>
        <input type="file" id="pi" accept="image/*" style="display:none" onchange="handlePhoto(this)">
        <div style="flex:1;color:var(--muted);font-size:12px;text-align:center;">or drag & drop</div>
        <button id="ab" class="abtn off" onclick="doLog()">Analyze →</button>
      </div>
    </div>
    <div id="mlist"></div>
  </div>

  <!-- HISTORY -->
  <div id="v1" style="display:none;">
    <div id="hlist"></div>
  </div>

</div>

<script>
var GOALS = {calories:2440,protein:180,carbs:250,fat:80};
var SUPABASE_URL = "https://nrmwgpochdtslsewhvdw.supabase.co";
var SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5ybXdncG9jaGR0c2xzZXdodmR3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAzMDE4MzMsImV4cCI6MjA5NTg3NzgzM30.fhVzmUezDsBy_OdMt5zIH25LIGPHEVDBBVskHVZojq8";

var meals = [], hist = {}, mtype = "Breakfast", pending = null, curtab = 0;

// ── Date ──────────────────────────────────────────────────────────────────────
function dk(){var d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
function fmtDate(k){var p=k.split("-");return new Date(+p[0],+p[1]-1,+p[2]).toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"});}

// ── Supabase ──────────────────────────────────────────────────────────────────
function dbSave(data){
  fetch("/api/analyze",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({action:"save",history:data})})
    .then(function(r){return r.json();})
    .then(function(d){console.log("Saved:",d.status||d);})
    .catch(function(e){console.error("Save failed:",e);});
}

function dbLoad(cb){
  fetch("/api/analyze",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({action:"load"})})
    .then(function(r){return r.json();})
    .then(function(d){
      var h = d.history;
      if(typeof h === "string") h = JSON.parse(h);
      if(!h || typeof h !== "object") h = {};
      console.log("DB loaded:",Object.keys(h).length,"days");
      cb(h);
    })
    .catch(function(e){console.error("Load failed:",e); cb({});});
}

function strip(arr){
  return (arr||[]).map(function(m){return {description:m.description,mealType:m.mealType,imageUrl:null,loading:false,nutrition:m.nutrition,error:m.error};});
}
function save(){var s={};Object.keys(hist).forEach(function(k){s[k]=strip(hist[k]);});dbSave(s);}

// ── Totals ────────────────────────────────────────────────────────────────────
function totals(ms){
  return (ms||[]).filter(function(m){return m.nutrition;}).reduce(function(a,m){
    return{calories:a.calories+(m.nutrition.calories||0),protein:a.protein+(m.nutrition.protein||0),carbs:a.carbs+(m.nutrition.carbs||0),fat:a.fat+(m.nutrition.fat||0)};
  },{calories:0,protein:0,carbs:0,fat:0});
}

// ── Render ────────────────────────────────────────────────────────────────────
function mb(l,v,u,c){return'<div class="mb" style="background:'+c+'18;border:1px solid '+c+'40;"><span class="mv" style="color:'+c+';">'+v+'<span style="font-size:11px;">'+u+'</span></span><span class="ml">'+l+'</span></div>';}
function gb(l,cur,goal,c,u){
  var pct=Math.min((cur/goal)*100,100),ov=cur>goal,cc=ov?"var(--over)":c;
  return'<div class="gbw"><div class="gbh"><span style="color:var(--text);font-weight:600;">'+l+'</span><span><span style="color:'+cc+';font-weight:700;">'+cur+u+'</span> <span style="color:var(--muted);">/ '+goal+u+'</span> <span style="color:'+( ov?"var(--over)":"var(--muted)")+';font-size:11px;">'+( ov?"+"+(cur-goal)+" over":(goal-cur)+" left")+'</span></span></div><div class="gbt" style="background:'+c+'20;"><div class="gbf" style="width:'+pct+'%;background:'+cc+';"></div></div></div>';
}

function renderSummary(){
  var done=meals.filter(function(m){return m.nutrition&&!m.loading;});
  if(!done.length){document.getElementById("summary").innerHTML="";return;}
  var t=totals(done),pct=Math.round((t.calories/GOALS.calories)*100),ov=pct>=100;
  document.getElementById("summary").innerHTML='<div class="grad">'
    +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">'
    +'<div style="color:var(--accent);font-weight:700;font-size:11px;letter-spacing:2px;text-transform:uppercase;">Daily Progress · '+done.length+' meal'+(done.length!==1?"s":"")+'</div>'
    +'<div style="background:'+(ov?"rgba(248,113,113,.15)":"rgba(200,245,101,.15)")+';border:1px solid '+(ov?"rgba(248,113,113,.4)":"rgba(200,245,101,.4)")+';border-radius:20px;padding:3px 14px;color:'+(ov?"var(--over)":"var(--accent)")+';font-size:13px;font-weight:700;">'+pct+'% of goal</div></div>'
    +'<div class="mbrow">'+mb("Calories",t.calories," kcal","var(--accent)")+mb("Protein",t.protein,"g","var(--protein)")+mb("Carbs",t.carbs,"g","var(--carbs)")+mb("Fat",t.fat,"g","var(--fat)")+'</div>'
    +'<div style="border-top:1px solid var(--border);padding-top:16px;">'
    +'<div style="color:var(--muted);font-size:10px;letter-spacing:2px;text-transform:uppercase;margin-bottom:12px;">Progress vs Goals</div>'
    +gb("Calories",t.calories,GOALS.calories,"var(--accent)"," kcal")
    +gb("Protein",t.protein,GOALS.protein,"var(--protein)","g")
    +gb("Carbs",t.carbs,GOALS.carbs,"var(--carbs)","g")
    +gb("Fat",t.fat,GOALS.fat,"var(--fat)","g")
    +'</div></div>';
}

function renderMeals(){
  var el=document.getElementById("mlist");
  if(!meals.length){el.innerHTML='<div class="empty"><div style="font-size:40px;margin-bottom:14px;">🍽</div><div style="font-weight:600;color:var(--text);font-size:16px;margin-bottom:8px;">Powered by Claude AI</div>Describe any meal in any language<br>Upload a photo for instant analysis</div>';return;}
  el.innerHTML=meals.map(function(m,i){
    var img=m.imageUrl?'<img src="'+m.imageUrl+'" style="width:80px;height:80px;object-fit:cover;border-radius:12px;border:1px solid var(--border);flex-shrink:0;">':'';
    var body=m.loading?'<div class="ldg"><div class="spin"></div>Claude is analyzing…</div>':m.error?'<div class="errbox">⚠ '+m.error+'</div>':m.nutrition?('<div class="mbrow">'+mb("Calories",m.nutrition.calories," kcal","var(--accent)")+mb("Protein",m.nutrition.protein,"g","var(--protein)")+mb("Carbs",m.nutrition.carbs,"g","var(--carbs)")+mb("Fat",m.nutrition.fat,"g","var(--fat)")+'</div>'+( m.nutrition.items&&m.nutrition.items.length?'<div style="border-top:1px solid var(--border);padding-top:10px;">'+m.nutrition.items.map(function(it){return'<div class="bdr"><div><span style="color:var(--text);font-weight:500;font-size:13px;">'+it.name+'</span><span style="color:var(--muted);font-size:12px;margin-left:8px;">'+it.amount+'</span></div><div style="display:flex;gap:10px;font-size:12px;"><span style="color:var(--accent);">'+it.calories+' kcal</span><span style="color:var(--protein);">P:'+it.protein+'g</span><span style="color:var(--carbs);">C:'+it.carbs+'g</span><span style="color:var(--fat);">F:'+it.fat+'g</span></div></div>';}).join("")+'</div>':'')):'';
    return'<div class="card si"><div class="mhdr">'+img+'<div style="flex:1;min-width:0;"><div style="display:flex;align-items:flex-start;"><span class="mbdg">'+m.mealType+'</span><button class="delbtn" onclick="delMeal('+i+')">×</button></div><div class="mdsc">'+(m.description||'<span style="color:var(--muted);font-style:italic;">Analyzing…</span>')+'</div></div></div>'+body+'</div>';
  }).join("");
}

function renderAll(){renderSummary();renderMeals();}

function renderHistory(){
  var days=Object.keys(hist).filter(function(k){return hist[k]&&hist[k].length;}).sort(function(a,b){return b.localeCompare(a);});
  if(!days.length){document.getElementById("hlist").innerHTML='<div class="empty"><div style="font-size:36px;margin-bottom:12px;">📅</div>No history yet.<br>Start logging meals today!</div>';return;}
  document.getElementById("hlist").innerHTML=days.map(function(key){
    var ms=hist[key],t=totals(ms),pct=Math.min(Math.round((t.calories/GOALS.calories)*100),100),isT=key===dk(),done=ms.filter(function(m){return m.nutrition;});
    return'<div class="hcard" style="border:1px solid '+(isT?"var(--accent)":"var(--border)")+';"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;"><div><div style="color:'+(isT?"var(--accent)":"var(--text)")+';font-weight:700;font-size:16px;">'+(isT?"Today":fmtDate(key))+'</div><div style="color:var(--muted);font-size:12px;">'+done.length+' meal'+(done.length!==1?"s":"")+'</div></div><div style="text-align:right;"><div style="color:var(--accent);font-weight:700;font-size:20px;">'+t.calories+'<span style="font-size:12px;"> kcal</span></div><div style="color:var(--muted);font-size:12px;">'+pct+'% of goal</div></div></div><div class="mbrow"><div class="mb" style="background:rgba(96,165,250,.12);border:1px solid rgba(96,165,250,.35);"><span class="mv" style="color:var(--protein);">'+t.protein+'<span style="font-size:10px;">g</span></span><span class="ml">P</span></div><div class="mb" style="background:rgba(245,158,11,.12);border:1px solid rgba(245,158,11,.35);"><span class="mv" style="color:var(--carbs);">'+t.carbs+'<span style="font-size:10px;">g</span></span><span class="ml">C</span></div><div class="mb" style="background:rgba(244,114,182,.12);border:1px solid rgba(244,114,182,.35);"><span class="mv" style="color:var(--fat);">'+t.fat+'<span style="font-size:10px;">g</span></span><span class="ml">F</span></div></div><div class="pbar"><div class="pfill" style="width:'+pct+'%;"></div></div>'+done.map(function(m){return'<div style="display:flex;justify-content:space-between;align-items:center;font-size:13px;margin-top:7px;"><div style="display:flex;align-items:center;gap:7px;min-width:0;overflow:hidden;"><span class="mbdg" style="font-size:9px;flex-shrink:0;">'+m.mealType+'</span><span style="color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">'+m.description+'</span></div><span style="color:var(--text);font-weight:600;white-space:nowrap;margin-left:8px;">'+m.nutrition.calories+' kcal</span></div>';}).join("")+'</div>';
  }).join("");
}

// ── Tabs ──────────────────────────────────────────────────────────────────────
function showTab(n){
  curtab=n;
  document.getElementById("v0").style.display=n===0?"block":"none";
  document.getElementById("v1").style.display=n===1?"block":"none";
  document.getElementById("t0").className="tab "+(n===0?"on":"off");
  document.getElementById("t1").className="tab "+(n===1?"on":"off");
  if(n===1) renderHistory();
}

// ── Meal types ────────────────────────────────────────────────────────────────
function renderMT(){
  document.getElementById("mtbrow").innerHTML=["Breakfast","Lunch","Dinner","Snack"].map(function(t){
    var a=t===mtype;
    return'<button class="mtb" style="background:'+(a?"var(--accent)":"transparent")+';color:'+(a?"#0f0e11":"var(--muted)")+';border-color:'+(a?"var(--accent)":"var(--border)")+';" onclick="setMT(\''+t+'\')">'+(t)+'</button>';
  }).join("");
}
function setMT(t){mtype=t;renderMT();}

// ── Input ─────────────────────────────────────────────────────────────────────
function updBtn(){var h=document.getElementById("mi").value.trim().length>0;var b=document.getElementById("ab");b.className="abtn "+(h?"on":"off");}
document.getElementById("mi").addEventListener("keydown",function(e){if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();doLog();}});
function doLog(){var t=document.getElementById("mi").value.trim();if(!t)return;document.getElementById("mi").value="";updBtn();logMeal({desc:t});}

// ── Claude API ────────────────────────────────────────────────────────────────
async function analyze(desc, imgB64){
  var uc=[];
  if(imgB64) uc.push({type:"image",source:{type:"base64",media_type:imgB64.mt,data:imgB64.data}});
  var prompt=imgB64
    ?"You are a nutrition expert. Analyze this food image"+(desc?' (described as: "'+desc+'")':"")+". Identify every item, estimate portions, calculate macros. Reply ONLY with valid JSON:\n{\"description\":\"brief summary\",\"calories\":0,\"protein\":0,\"carbs\":0,\"fat\":0,\"items\":[{\"name\":\"food\",\"amount\":\"portion\",\"calories\":0,\"protein\":0,\"carbs\":0,\"fat\":0}]}"
    :"You are a nutrition expert. Calculate macros for: \""+desc+"\". Reply ONLY with valid JSON:\n{\"description\":\""+desc+"\",\"calories\":0,\"protein\":0,\"carbs\":0,\"fat\":0,\"items\":[{\"name\":\"food\",\"amount\":\"portion\",\"calories\":0,\"protein\":0,\"carbs\":0,\"fat\":0}]}";
  uc.push({type:"text",text:prompt});
  var r=await fetch("/api/analyze",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({messages:[{role:"user",content:uc}]})});
  var raw=await r.text();
  var d;
  try{d=JSON.parse(raw);}catch(e){throw new Error("Parse error: "+raw.slice(0,100));}
  if(!r.ok||d.error) throw new Error(d.error&&d.error.message?d.error.message:"API error "+r.status);
  var txt=(d.content||[]).map(function(b){return b.text||"";}).join("");
  var m=txt.match(/\{[\s\S]*\}/);
  if(!m) throw new Error("No JSON in response");
  var res=JSON.parse(m[0]);
  ["calories","protein","carbs","fat"].forEach(function(k){res[k]=Math.round(Number(res[k])||0);});
  if(res.items) res.items.forEach(function(it){["calories","protein","carbs","fat"].forEach(function(k){it[k]=Math.round(Number(it[k])||0);});});
  return res;
}

// ── Log meal ──────────────────────────────────────────────────────────────────
async function logMeal(opts){
  var desc=opts.desc||"",imgB64=opts.imgB64||null,imgUrl=opts.imgUrl||null;
  var idx=meals.length;
  meals.push({description:desc,mealType:mtype,imageUrl:imgUrl,loading:true,nutrition:null,error:null});
  renderAll();
  try{
    var n=await analyze(desc,imgB64);
    meals[idx]=Object.assign({},meals[idx],{description:n.description||desc,nutrition:n,loading:false});
    hist[dk()]=meals.slice();
    save();
    renderAll();
  }catch(e){
    meals[idx]=Object.assign({},meals[idx],{loading:false,error:"Analysis failed: "+e.message});
    renderAll();
  }
}

function delMeal(i){meals.splice(i,1);hist[dk()]=meals.slice();save();renderAll();}

// ── Photo ─────────────────────────────────────────────────────────────────────
function handlePhoto(inp){var f=inp.files[0];if(!f)return;var r=new FileReader();r.onload=function(e){var b=e.target.result,p=b.split(","),mt=p[0].match(/:(.*?);/)[1];pending={imgUrl:b,imgB64:{mt:mt,data:p[1]}};document.getElementById("mprev").src=b;document.getElementById("mdesc").value="";document.getElementById("modal").style.display="flex";};r.readAsDataURL(f);inp.value="";}
function closeModal(){document.getElementById("modal").style.display="none";pending=null;}
function confirmPhoto(){if(!pending)return;var d=document.getElementById("mdesc").value.trim(),p=pending;closeModal();logMeal({desc:d,imgB64:p.imgB64,imgUrl:p.imgUrl});}

// ── Init ──────────────────────────────────────────────────────────────────────
renderMT();
renderAll();
dbLoad(function(data){
  hist = data;
  var k = dk();
  meals = hist[k] ? hist[k] : [];
  renderAll();
  if(curtab===1) renderHistory();
});
